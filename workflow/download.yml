name: Universal File Downloader

# این workflow فقط زمانی اجرا می‌شود که شما خودتان دستی شروعش کنید
on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'لینک مستقیم فایل مورد نظر را وارد کنید'
        required: true
        default: 'https://cloud.cutefunny.moe/s/ZjnNSmGe2PCx7cK/download?path=%2FIA%20Game&files=IA-v1.2-pc.zip'
        type: string

jobs:
  download-file:
    runs-on: ubuntu-latest
    steps:
      # 1. ابتدا کدهای خالی ریپازیتوری را دریافت می‌کند
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. کار اصلی: دانلود فایل با استفاده از curl
      - name: Download the file
        run: |
          echo "Starting download from: ${{ inputs.file_url }}"
          # اینجا فایل دانلود می‌شود. نام فایل خروجی را 'my-file.zip' بگذارید.
          curl -L "${{ inputs.file_url }}" --output my-file.zip
          echo "Download completed!"

      # 3. فایل دانلود شده را به ریپازیتوری گیت‌هاب اضافه می‌کند
      - name: Commit and push the file
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add my-file.zip
          git commit -m "Add downloaded file via GitHub Actions" || echo "No changes to commit"
          git push