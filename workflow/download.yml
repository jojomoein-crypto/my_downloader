name: Universal File Downloader

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'لینک مستقیم فایل مورد نظر را وارد کنید'
        required: true
        default: 'https://cloud.cutefunny.moe/s/ZjnNSmGe2PCx7cK/download?path=%2FIA%20Game&files=IA-v1.2-pc.zip'
        type: string

jobs:
  download-file:
    runs-on: ubuntu-latest
    steps:
      - name: Download the file
        run: |
          echo "Downloading from: ${{ inputs.file_url }}"
          curl -L "${{ inputs.file_url }}" --output my-file.zip
          echo "Download completed! File size:"
          ls -lh my-file.zip

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-file
          path: my-file.zip
